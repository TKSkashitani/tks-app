<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKS 書類作成システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#EDEDED;min-height:100vh}
input,textarea,select{outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#E8000D!important}
.card{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fld-label{font-size:11px;color:#999;margin-bottom:4px;font-weight:500}
.inp{width:100%;border:1.5px solid #D4D4D4;border-radius:6px;padding:8px 10px;font-size:13px;background:#fff;font-family:inherit;transition:border-color .15s}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:14px;margin-bottom:14px}
.btn-red{padding:5px 16px;background:#E8000D;color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit}
.btn-outline{padding:10px 22px;background:#fff;color:#1A1A1A;border:2px solid #1A1A1A;border-radius:7px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit}
.btn-gray{padding:10px 22px;background:#fff;color:#666;border:2px solid #CCC;border-radius:7px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit}
.btn-primary{padding:10px 28px;background:#E8000D;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit;box-shadow:0 4px 12px rgba(232,0,13,.3)}
.btn-register{padding:10px 22px;background:#1a7a4a;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit;box-shadow:0 4px 12px rgba(26,122,74,.3)}
.row-tr:hover td{background:#F5F5F5!important}
.del-btn{opacity:0;transition:opacity .15s;background:none;border:none;color:#E8000D;cursor:pointer;font-size:18px}
.row-tr:hover .del-btn{opacity:1}
.client-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .12s}
.client-row:hover{background:#FFF5F5}
.tab-btn{padding:7px 20px;border-radius:6px;border:2px solid #CCC;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;background:#fff;color:#666;transition:all .15s}
.tab-btn.active{background:#E8000D;color:#fff;border-color:#E8000D}
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 28px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:9999;display:none;white-space:nowrap}
.preview-wrap{margin-top:24px;background:#fff;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.1);display:none}
.preview-bar{padding:10px 24px;background:#EDEDED;border-radius:10px 10px 0 0;font-size:12px;color:#888}
@media print{
  @page{size:A4 portrait;margin:0}
  body{background:#fff}
  .no-print{display:none!important}
  #preview-content{padding:14mm 14mm 10mm!important}
}
</style>
</head>
<body>

<!-- BODY -->
<div style="max-width:920px;margin:0 auto;padding:26px 14px 60px">

  <!-- 書類情報 -->
  <div class="card">
    <div class="grid4">
      <div><div class="fld-label">書類番号</div><input class="inp" id="docNo"></div>
      <div><div class="fld-label">発行日</div><input class="inp" type="date" id="docDate"></div>
      <div id="date3-wrap"><div class="fld-label" id="date3-label">有効期限</div><input class="inp" type="date" id="date3"></div>
      <div id="field4-wrap"><div class="fld-label" id="field4-label">担当者名</div><input class="inp" id="field4" placeholder="山田 太郎"></div>
    </div>
    <div id="payment-wrap" style="margin-top:14px;max-width:220px;display:none">
      <div class="fld-label">支払条件</div><input class="inp" id="payment" value="納品後30日以内">
    </div>
  </div>

  <!-- 宛先 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;font-weight:700;color:#1A1A1A">宛先・件名</span>
      <div style="display:flex;gap:8px">
        <button class="tab-btn" onclick="toggleClientList()" id="cl-btn" style="padding:5px 14px;font-size:12px;border-color:#CCC">📋 取引先を選択</button>
        <button class="btn-red" onclick="saveClient()">💾 保存</button>
      </div>
    </div>
    <div id="client-list" style="display:none;background:#fff;border:1.5px solid #E8E8E8;border-radius:8px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;max-height:300px;overflow-y:auto"></div>
    <div class="grid3">
      <div><div class="fld-label">取引先名</div><input class="inp" id="cName" placeholder="○○株式会社"></div>
      <div><div class="fld-label">部署名</div><input class="inp" id="cDept" placeholder="ご担当部署"></div>
      <div><div class="fld-label">住所</div><input class="inp" id="cAddr" placeholder="大阪府大阪市…"></div>
    </div>
    <div><div class="fld-label">件名</div><input class="inp" id="docTitle" placeholder="業務用厨房機器 納入一式" style="max-width:460px"></div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;font-weight:700">明細</span>
      <button class="btn-red" onclick="addRow()">＋ 行を追加</button>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px" id="itemTable">
        <thead>
          <tr style="background:#1A1A1A;color:#fff">
            <th style="padding:8px;text-align:left;font-size:11px">品名・型番</th>
            <th style="padding:8px;text-align:left;font-size:11px">仕様</th>
            <th style="padding:8px;text-align:center;font-size:11px;width:62px">数量</th>
            <th style="padding:8px;text-align:center;font-size:11px;width:70px">単位</th>
            <th style="padding:8px;text-align:center;font-size:11px;width:110px">単価</th>
            <th style="padding:8px;text-align:center;font-size:11px;width:110px">金額</th>
            <th style="padding:8px;text-align:left;font-size:11px;min-width:90px">備考</th>
            <th style="width:28px"></th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:18px">
      <div style="width:300px">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #EEE;font-size:12px"><span style="color:#777">小計</span><span id="subtotal">¥0</span></div>
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #EEE;font-size:12px">
          <span style="flex:1;color:#777">消費税</span>
          <select id="taxRate" onchange="calc()" style="border:1.5px solid #D4D4D4;border-radius:4px;padding:3px 6px;font-size:12px;font-family:inherit">
            <option value="10">10%</option><option value="8">8%（軽減）</option><option value="0">非課税</option>
          </select>
          <span id="taxAmt" style="font-size:12px;min-width:90px;text-align:right">¥0</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid #1A1A1A;margin-top:4px">
          <span style="font-weight:700;font-size:14px">合計（税込）</span>
          <span id="totalAmt" style="font-weight:900;font-size:18px;color:#E8000D">¥0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 備考 -->
  <div class="card">
    <div class="fld-label">備考</div>
    <textarea class="inp" id="remarks" rows="3" placeholder="特記事項・補足など" style="resize:vertical;margin-top:4px"></textarea>
  </div>

  <!-- スプレッドシート連携ガイド -->
  <div class="card no-print">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:4px;height:22px;background:#E8000D;border-radius:2px"></div>
      <span style="font-size:13px;font-weight:700">Googleスプレッドシート連携ガイド</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
      <div style="background:#EDEDED;border-radius:8px;padding:14px 16px"><div style="font-size:13px;font-weight:700;color:#E8000D;margin-bottom:6px">① CSV出力</div><p style="font-size:11px;color:#666;line-height:1.7">「CSV出力」ボタンで書類種別・取引先・明細・金額が一覧形式でダウンロードされます。</p></div>
      <div style="background:#EDEDED;border-radius:8px;padding:14px 16px"><div style="font-size:13px;font-weight:700;color:#E8000D;margin-bottom:6px">② スプレッドシートに取込み</div><p style="font-size:11px;color:#666;line-height:1.7">GoogleスプレッドシートでCSVをインポート。GASを使えば自動取込みも可能です。</p></div>
      <div style="background:#EDEDED;border-radius:8px;padding:14px 16px"><div style="font-size:13px;font-weight:700;color:#E8000D;margin-bottom:6px">③ 月次集計</div><p style="font-size:11px;color:#666;line-height:1.7">SUMIF・ピボットテーブルで拠点別・月別の売上・件数を自動集計できます。</p></div>
    </div>
  </div>

  <!-- ボタン -->
  <div style="display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap" class="no-print">
    <button class="btn-outline" onclick="exportCSV()">📊 CSV出力</button>
    <button class="btn-register" onclick="registerToSheet()">📤 スプレッドシートに登録</button>
    <button class="btn-gray" onclick="togglePreview()">👁 プレビュー</button>
    <button class="btn-primary" onclick="doPrint()">🖨 印刷 / PDF保存</button>
  </div>

  <!-- プレビュー -->
  <div class="preview-wrap" id="previewWrap">
    <div class="preview-bar">印刷プレビュー（A4縦）</div>
    <div id="preview-content" style="padding:28px 36px;font-size:11.5px;color:#1a1a1a"></div>
  </div>

</div>

let tab='見積書';
let clients=[];
let showCL=false;
let showPreview=false;
let rowId=0;

// 日付フォーマット
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return y+'年'+Number(m)+'月'+Number(d)+'日';}
function fmtNum(n){return Number(n||0).toLocaleString('ja-JP');}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function genNo(t){const d=new Date();return PREFIXES[t]+'-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-001';}

// 初期化
function init(){
  document.getElementById('docDate').value=today();
  document.getElementById('docNo').value=genNo('見積書');
  try{
    const saved=localStorage.getItem('tks_clients');
    if(saved){
      const p=JSON.parse(saved);
      const keys=p.map(c=>c.name+c.dept);
      clients=sortC([...p,...DEFAULT_CLIENTS.filter(d=>!keys.includes(d.name+d.dept))]);
    }else{clients=sortC(DEFAULT_CLIENTS);}
  }catch(e){clients=sortC(DEFAULT_CLIENTS);}
  addRow();
}

function sortC(arr){return[...arr].sort((a,b)=>(a.name+a.dept).localeCompare(b.name+b.dept,'ja'));}

// タブ切替
function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('docNo').value=genNo(t);
  // date3
  const d3l=document.getElementById('date3-label');
  const pw=document.getElementById('payment-wrap');
  const f4l=document.getElementById('field4-label');
  const f4=document.getElementById('field4');
  if(t==='見積書'){d3l.textContent='有効期限';pw.style.display='none';f4l.textContent='担当者名';f4.placeholder='山田 太郎';}
  else if(t==='納品書'){d3l.textContent='納品日';pw.style.display='none';f4l.textContent='担当者名';f4.placeholder='山田 太郎';}
  else{d3l.textContent='納品日';pw.style.display='block';f4l.textContent='担当者名';f4.placeholder='山田 太郎';}
  if(showPreview) renderPreview();
}

// 明細行
function addRow(){
  const id=++rowId;
  const tbody=document.getElementById('itemBody');
  const tr=document.createElement('tr');
  tr.className='row-tr';
  tr.id='row-'+id;
  tr.style.borderBottom='1px solid #E8E8E8';
  tr.innerHTML=`
    <td style="padding:5px 4px;min-width:160px"><input class="inp" style="padding:5px 7px;font-size:12px" placeholder="品名" oninput="calc()" data-field="name" data-id="${id}"></td>
    <td style="padding:5px 4px;min-width:100px"><input class="inp" style="padding:5px 7px;font-size:12px" placeholder="仕様" data-field="spec" data-id="${id}"></td>
    <td style="padding:5px 4px"><input class="inp" style="padding:5px 4px;font-size:12px;text-align:center" type="number" value="1" oninput="calc()" data-field="qty" data-id="${id}"></td>
    <td style="padding:5px 4px"><select class="inp" style="padding:5px 2px;font-size:12px" data-field="unit" data-id="${id}"><option>台</option><option>式</option><option>個</option><option>本</option><option>枚</option><option>セット</option><option>回</option><option>ヶ月</option></select></td>
    <td style="padding:5px 4px"><input class="inp" style="padding:5px 4px;font-size:12px;text-align:right" type="number" value="0" oninput="calc()" data-field="price" data-id="${id}"></td>
    <td style="padding:5px 8px;text-align:right;font-weight:600" id="amt-${id}">¥0</td>
    <td style="padding:5px 4px"><input class="inp" style="padding:5px 7px;font-size:12px" placeholder="備考" data-field="note" data-id="${id}"></td>
    <td style="padding:5px 4px;text-align:center"><button class="del-btn" onclick="delRow(${id})">×</button></td>
  `;
  tbody.appendChild(tr);
  calc();
}

function delRow(id){
  const rows=document.querySelectorAll('#itemBody tr');
  if(rows.length<=1)return;
  document.getElementById('row-'+id).remove();
  calc();
}

function getRows(){
  const rows=[];
  document.querySelectorAll('#itemBody tr').forEach(tr=>{
    const id=tr.id.replace('row-','');
    const get=f=>tr.querySelector('[data-field="'+f+'"]')?.value||'';
    rows.push({id,name:get('name'),spec:get('spec'),qty:Number(get('qty')||0),unit:get('unit')||'台',price:Number(get('price')||0),note:get('note')});
  });
  return rows;
}

function calc(){
  const rows=getRows();
  const sub=rows.reduce((s,r)=>s+r.qty*r.price,0);
  const rate=Number(document.getElementById('taxRate').value);
  const tax=Math.floor(sub*(rate/100));
  const total=sub+tax;
  rows.forEach(r=>{const el=document.getElementById('amt-'+r.id);if(el)el.textContent='¥'+fmtNum(r.qty*r.price);});
  document.getElementById('subtotal').textContent='¥'+fmtNum(sub);
  document.getElementById('taxAmt').textContent='¥'+fmtNum(tax);
  document.getElementById('totalAmt').textContent='¥'+fmtNum(total);
  if(showPreview) renderPreview();
}

  el.style.display=showCL?'block':'none';

}

function renderClientList(){
  const el=document.getElementById('client-list');
  el.innerHTML='';
  [...clients].sort((a,b)=>(a.name+a.dept).localeCompare(b.name+b.dept,'ja')).forEach(c=>{
    const div=document.createElement('div');
    div.className='client-row';
    div.innerHTML=`<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#222">${c.name}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${c.dept?'<span style="margin-right:8px">'+c.dept+'</span>':''}${c.addr}</div></div><button onclick="event.stopPropagation();deleteClient(${c.id})" style="background:none;border:none;color:#ddd;cursor:pointer;font-size:16px;padding:2px 6px">×</button>`;
    div.addEventListener('click',()=>selectClient(c));
    el.appendChild(div);
  });
}

function selectClient(c){
  document.getElementById('cName').value=c.name;
  document.getElementById('cDept').value=c.dept;
  document.getElementById('cAddr').value=c.addr;
  showCL=false;
  document.getElementById('client-list').style.display='none';
}

function saveClient(){
  const name=document.getElementById('cName').value.trim();
  if(!name){showToast('取引先名を入力してください');return;}
  const dept=document.getElementById('cDept').value;
  const addr=document.getElementById('cAddr').value;
  const entry={id:Date.now(),name,dept,addr};
  clients=sortC([entry,...clients.filter(c=>!(c.name===name&&c.dept===dept))]);
  try{localStorage.setItem('tks_clients',JSON.stringify(clients));}catch(e){}
  showToast('取引先を保存しました ✓');
}

function deleteClient(id){
  clients=clients.filter(c=>c.id!==id);
  try{localStorage.setItem('tks_clients',JSON.stringify(clients));}catch(e){}
  renderClientList();
}

// トースト
function showToast(msg){
  const el=document.getElementById('toast');

}

// CSV出力
function exportCSV(){
  const rows=getRows();
  const no=document.getElementById('docNo').value;
  const date=fmtDate(document.getElementById('docDate').value);
  const client=document.getElementById('cName').value;
  const sub=rows.reduce((s,r)=>s+r.qty*r.price,0);
  const rate=Number(document.getElementById('taxRate').value);
  const tax=Math.floor(sub*(rate/100));
  const total=sub+tax;
  const data=[
    ['書類種別','書類番号','発行日','取引先','品名','仕様','数量','単位','単価','金額','備考'],
    ...rows.map(r=>[tab,no,date,client,r.name,r.spec,r.qty,r.unit,r.price,r.qty*r.price,r.note]),
    [],[,'','',...Array(5).fill(''),'小計',sub,''],[,...Array(7).fill(''),'消費税',tax,''],[,...Array(7).fill(''),'合計（税込）',total,'']
  ];
  const csv=data.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=tab+'_'+no+'.csv';a.click();
  showToast('CSVをダウンロードしました');
}

// ── スプレッドシート登録 ──────────────────────────
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyRSen3pK80hsAIyBJPCu_EGq8T7TBRK1MCD3wJXl5wpn5QHELGjZxpdoombSiOxfSozA/exec";

async function registerToSheet(){
  const rows = getRows();
  const no   = document.getElementById('docNo').value;
  const date = document.getElementById('docDate').value;
  const date3= document.getElementById('date3').value;
  const staff= document.getElementById('field4').value;
  const payment = document.getElementById('payment').value;
  const cName= document.getElementById('cName').value;
  const cDept= document.getElementById('cDept').value;
  const cAddr= document.getElementById('cAddr').value;
  const docTitle = document.getElementById('docTitle').value;
  const remarks  = document.getElementById('remarks').value;
  const rate = Number(document.getElementById('taxRate').value);
  const sub  = rows.reduce((s,r)=>s+r.qty*r.price,0);
  const tax  = Math.floor(sub*(rate/100));
  const total= sub+tax;

  if(!cName.trim()){ showToast('取引先名を入力してください'); return; }
  if(!no.trim())   { showToast('書類番号を入力してください'); return; }
  if(rows.every(r=>!r.name.trim())){ showToast('明細を1行以上入力してください'); return; }

  const payload = {
    docType:  tab,
    docNo:    no,
    docDate:  fmtDate(date),
    expireOrDeliver: tab==='見積書' ? fmtDate(date3) : '',
    deliverDate:     tab!=='見積書' ? fmtDate(date3) : '',
    paymentTerms:    tab==='請求書' ? payment : '',
    cName, cDept, cAddr,
    docTitle, remarks, staff,
    subtotal: sub,
    taxRate:  rate,
    tax,
    total,
    items: rows.map(r=>({
      name:  r.name,
      spec:  r.spec,
      qty:   r.qty,
      unit:  r.unit,
      price: r.price,
      amount:r.qty*r.price,
      note:  r.note
    }))
  };

  // ボタンをローディング状態に
  const btn = document.querySelector('.btn-register');
  const orig = btn.textContent;
  btn.textContent = '登録中...';
  btn.disabled = true;

  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.status === 'ok'){
      showToast('スプレッドシートに登録しました ✓');
    } else {
      showToast('エラー：' + (json.message || '不明なエラー'));
    }
  } catch(e) {
    showToast('通信エラー：' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}
